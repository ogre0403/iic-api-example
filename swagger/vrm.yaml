openapi: 3.0.0
info:
  contact: {}
  description: ASUS Enterprise Virtual Registry Management 以 Portal 需求列出其需要的
    Restful API Response 以 Json 格式呈現
  title: Virtual Registry Management RESTful API
  version: v0.1.11
tags:
  - name: User/Project
  - name: User/Exports
  - name: User/MemberAcl
  - name: User/Repository
  - name: User/Tag
  - name: User/Snapshot
  - name: User/Image
  - name: User/ProjectAcl
  - name: Admin/Export
  - name: Admin/Image
  - name: Admin/MemberAcl
  - name: Admin/Project
  - name: Admin/Snapshot
  - name: Admin/ProjectAcl
  - name: Admin/Repository
  - name: Admin/Tag
paths:
  "/admin/export/{export-id}":
    delete:
      description: Delete an export record by its ID
      parameters:
        - description: Export ID
          in: path
          name: export-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.DeleteExportOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 刪除指定的匯出紀錄
      security:
        - bearerAuth: []
      tags:
        - Admin/Export
    get:
      description: Retrieve export details by export ID
      parameters:
        - description: Export ID
          in: path
          name: export-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.GetExportOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 取得指定的匯出資訊
      security:
        - bearerAuth: []
      tags:
        - Admin/Export
  /admin/exports:
    get:
      description: Get a paginated list of exports with optional filtering
      parameters:
        - description: Number of items to return
          in: query
          name: limit
          schema:
            type: integer
            default: 100
        - description: Number of items to skip
          in: query
          name: offset
          schema:
            type: integer
            default: 0
        - description: Filter conditions
          in: query
          name: where
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ListExportsOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 列出所有的匯出資訊
      security:
        - bearerAuth: []
      tags:
        - Admin/Export
  /admin/import:
    post:
      description: Creates a common tag from an existing OpenStack Glance image and
        sets it as public
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.ImportImageInput"
        description: Import image request
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ImportImageOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 匯入 Image (已存在於openstack)
      security:
        - bearerAuth: []
      tags:
        - Admin/Image
  "/admin/memberacl/{member-acl-id}":
    delete:
      description: Delete a specific member ACL by ID
      parameters:
        - description: Member ACL ID
          in: path
          name: member-acl-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 刪除指定的 member-acl
      security:
        - bearerAuth: []
      tags:
        - Admin/MemberAcl
  "/admin/project/{project-id}":
    get:
      description: Get project usage statistics and limits information
      parameters:
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.GetProjectInfoOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 取得 project 資訊
      security:
        - bearerAuth: []
      tags:
        - Admin/Project
    put:
      description: Update the soft limit count and size for a project
      parameters:
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.UpdateProjectInput"
        description: Update project request
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.UpdateProjectOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 更新指定的 project
      security:
        - bearerAuth: []
      tags:
        - Admin/Project
  "/admin/project/{project-id}/server/{server-id}/snapshot":
    post:
      description: Create a snapshot of a VPS server, either by creating a new
        repository or using an existing one
      parameters:
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
        - description: Server ID
          in: path
          name: server-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.CreateSnapshotInput"
        description: Snapshot creation parameters
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.CreateSnapshotOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 對 Server 建立 snapshot
      security:
        - bearerAuth: []
      tags:
        - Admin/Snapshot
  /admin/projectacl:
    post:
      description: Create a new project access control list entry for tag sharing and
        project access management
      requestBody:
        $ref: "#/components/requestBodies/admin.CreateProjectAclInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.CreateProjectAclOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 在指定的 tag 創建 project-acl 分享給其他成員使用
      security:
        - bearerAuth: []
      tags:
        - Admin/ProjectAcl
  "/admin/projectacl/{project-acl-id}":
    delete:
      description: Delete a specific project ACL by ID or remove project ACL from a tag
      parameters:
        - description: Project ACL ID (when deleting specific ACL)
          in: path
          name: project-acl-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 指定的 tag 停止分享給其他成員使用
      security:
        - bearerAuth: []
      tags:
        - Admin/ProjectAcl
  /admin/projectacls:
    get:
      description: List project ACLs with pagination and filtering support
      parameters:
        - description: "Number of items to return (default: 100)"
          in: query
          name: limit
          schema:
            type: integer
        - description: "Number of items to skip (default: 0)"
          in: query
          name: offset
          schema:
            type: integer
        - description: Filter conditions
          in: query
          name: where
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Filter by namespace
          in: query
          name: namespace
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ListProjectAclsOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 取得所有 project-acl
      security:
        - bearerAuth: []
      tags:
        - Admin/ProjectAcl
  /admin/projects:
    get:
      description: List all projects with their usage statistics and limits
      parameters:
        - description: "Number of items to return (default: 100)"
          in: query
          name: limit
          schema:
            type: integer
        - description: "Number of items to skip (default: 0)"
          in: query
          name: offset
          schema:
            type: integer
        - description: Filter by namespace
          in: query
          name: namespace
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ListProjectsOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 取得 project 資訊
      security:
        - bearerAuth: []
      tags:
        - Admin/Project
  /admin/repositories:
    get:
      description: Get a paginated list of repositories with optional filtering
      parameters:
        - description: Limit number of results
          in: query
          name: limit
          schema:
            type: integer
            default: 100
        - description: Offset for pagination
          in: query
          name: offset
          schema:
            type: integer
            default: 0
        - description: Filter conditions
          in: query
          name: where
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Filter by namespace
          in: query
          name: namespace
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ListRepositoriesOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 列出所有的 repositories
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
  /admin/repository:
    post:
      description: Create a new repository with administrative privileges
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.CreateRepositoryInput"
        description: Repository creation payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.CreateRepositoryOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 創建 repository
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
  "/admin/repository/{repository-id}":
    delete:
      description: Delete a specific repository and all its associated tags (if not
        protected)
      parameters:
        - description: Repository ID
          in: path
          name: repository-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 棄用指定的 repository
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
    get:
      description: Get detailed information about a specific repository
      parameters:
        - description: Repository ID
          in: path
          name: repository-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.GetRepositoryOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 取得指定的 repository
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
    put:
      description: Update an existing repository with administrative privileges
      parameters:
        - description: Repository ID
          in: path
          name: repository-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.UpdateRepositoryInput"
        description: Repository update payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.UpdateRepositoryOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 更新指定的 repository
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
  "/admin/repository/{repository-id}/protect":
    delete:
      description: Disable protection for a specific repository with administrative
        privileges
      parameters:
        - description: Repository ID
          in: path
          name: repository-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.UnsetRepositoryProtectOutput"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 解除保護指定的 repository
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
    post:
      description: Enable protection for a specific repository with administrative
        privileges
      parameters:
        - description: Repository ID
          in: path
          name: repository-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.SetRepositoryProtectOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 設定保護指定的 repository (避免被刪除)
      security:
        - bearerAuth: []
      tags:
        - Admin/Repository
  /admin/tag:
    post:
      description: Create a new tag with administrative privileges and simultaneously
        create an empty Glance image
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.CreateTagInput"
        description: Tag creation payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.CreateTagOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 創建 tag
      security:
        - bearerAuth: []
      tags:
        - Admin/Tag
  "/admin/tag/{tag-id}":
    delete:
      description: Delete a specific tag (if not protected)
      parameters:
        - description: Tag ID
          in: path
          name: tag-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRegistryManagement_utility.ErrResponse"
      summary: 棄用指定的 tag
      security:
        - bearerAuth: []
      tags:
        - Admin/Tag
    get:
      description: Get detailed information about a specific tag
      parameters:
        - description: Tag ID
          in: path
          name: tag-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
