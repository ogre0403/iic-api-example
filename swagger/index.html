<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIC API Documentation</title>
  <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements/styles.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 50px;
      background: #1c2333;
      flex-shrink: 0;
    }

    .topbar-title {
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 600;
      margin-right: 16px;
      white-space: nowrap;
    }

    .tab-btn {
      color: #94a3b8;
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn:hover {
      background: #2d3748;
      color: #e2e8f0;
    }

    .tab-btn.active {
      background: #2563eb;
      color: #fff;
    }

    .viewer {
      flex: 1;
      overflow: hidden;
    }

    elements-api {
      display: block;
      height: 100%;
      zoom: 1.2;
    }
  </style>
</head>
<body>
  <nav class="topbar">
    <span class="topbar-title">IIC API Docs</span>
    <button class="tab-btn active" onclick="switchApi('iam.yaml', this)">IAM</button>
    <button class="tab-btn" onclick="switchApi('mcc.yaml', this)">MCC</button>
    <button class="tab-btn" onclick="switchApi('vps.yaml', this)">VPS</button>
  </nav>

  <div class="viewer">
    <elements-api
      id="api-viewer"
      apiDescriptionUrl="iam.yaml"
      router="hash"
      layout="sidebar"
    ></elements-api>
  </div>

  <script>
    function switchApi(file, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      // Remove and recreate the element to force Stoplight Elements to reload the spec
      const container = document.querySelector('.viewer');
      const old = document.getElementById('api-viewer');
      container.removeChild(old);
      const next = document.createElement('elements-api');
      next.id = 'api-viewer';
      next.setAttribute('apiDescriptionUrl', file);
      next.setAttribute('router', 'hash');
      next.setAttribute('layout', 'sidebar');
      container.appendChild(next);
    }
  </script>
</body>
</html>
