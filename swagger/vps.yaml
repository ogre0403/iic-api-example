openapi: 3.0.0
info:
  contact: {}
  description: Virtual Platform Service API
  title: VPS API
  version: "v.0.4.27"
tags:
  - name: User/root_features
  - name: User/auto_scale_group
  - name: User/flavor
  - name: User/floating_ip
  - name: User/keypair
  - name: User/loadbalancer
  - name: User/network
  - name: User/quota
  - name: User/router
  - name: User/security_group
  - name: User/server
  - name: User/share
  - name: User/snapshots
  - name: User/volume_types
  - name: User/volumes
  - name: User/snapshot-schedules
  - name: User/root_version
  - name: Admin/asg
  - name: Admin/az
  - name: Admin/extnet
  - name: Admin/flavor
  - name: Admin/fip
  - name: Admin/gpu_model
  - name: Admin/loadbalancer
  - name: Admin/net_qos
  - name: Admin/network
  - name: Admin/opsk
  - name: Admin/provider_network
  - name: Admin/quota
  - name: Admin/server
  - name: Admin/share
  - name: Admin/action
  - name: Admin/voltype
  - name: Admin/volume
  - name: Admin/volume_type
paths:
  /admin/auto_scale_groups:
    get:
      description: >-
        List all auto scaling groups across all projects with admin privileges.
        Supports filtering by various parameters.

        Query parameters:

        - project_id: Filter by project ID

        - name: Filter by auto scaling group name

        - status: Filter by auto scaling group status

        - user_id: Filter by user ID

        - namespace: Filter by namespace

        - network_id: Filter by network ID

        - flavor_id: Filter by flavor ID

        - detail: Set to true to get detailed information
      parameters:
        - description: Project ID
          in: query
          name: project_id
          schema:
            type: string
        - description: Auto scaling group name
          in: query
          name: name
          schema:
            type: string
        - description: Auto scaling group status
          in: query
          name: status
          schema:
            type: string
        - description: User ID
          in: query
          name: user_id
          schema:
            type: string
        - description: Namespace
          in: query
          name: namespace
          schema:
            type: string
        - description: Network ID
          in: query
          name: network_id
          schema:
            type: string
        - description: Flavor ID
          in: query
          name: flavor_id
          schema:
            type: string
        - description: Get detailed information
          in: query
          name: detail
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.AsgListOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: List Auto Scaling Groups (Admin)
      tags:
        - Admin/asg
  "/admin/auto_scale_groups/{asg-id}":
    get:
      description: Get detailed information about a specific auto scaling group with
        admin privileges.
      parameters:
        - description: Auto Scaling Group ID
          in: path
          name: asg-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.AsgInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: Get Auto Scaling Group (Admin)
      tags:
        - Admin/asg
  /admin/az/compute:
    get:
      description: Return nova availability zone info.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.NovaAZList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: List Nova AZ
      tags:
        - Admin/az
  /admin/extnetworks:
    get:
      description: Return all available external networks.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetListOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: List external networks
      tags:
        - Admin/extnet
    post:
      description: >-
        This API will import a given external network into VPS if it exists in
        OPSK.


        Request body parameters:

        - opsk_extnetwork_id : External Network ID in Openstack.(required)

        - namespace : Namespace which owns the external network.(required)

        - description: Description of this external network.(optional)

        - is_default: Whether this external network should be set default.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.ExtNetCreateInput"
        description: body data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Import external network
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}":
    delete:
      description: This operation deletes an external network from VPS.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Delete external network
      tags:
        - Admin/extnet
    get:
      description: Return information of specific external network.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Get external network
      tags:
        - Admin/extnet
    put:
      description: |-
        This method updates description of a particular external network.

        Request body parameter:
        - description: New description of this external network.(optional)
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.ExtNetUpdateInput"
        description: body data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Update external network
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/default":
    post:
      description: This API sets specified external network as default one for its
        namespace.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Set external network as default
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/ports":
    get:
      description: List all ports on the specific external network
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetListPortOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: List ports on external network
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/ports/{port-id}":
    get:
      description: Gets detailed information about a single port.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
        - description: Port ID
          in: path
          name: port-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.ExtNetPortInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: Get port
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/ports/{port-id}/action":
    post:
      description: Do an action on the specified port
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
        - description: Port ID
          in: path
          name: port-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.ExtnetPortActionInput"
        description: body data
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: Do Action to Port
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/project/{project-id}":
    post:
      description: Associates given project with provided external network.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Associate project with extnetworks
      tags:
        - Admin/extnet
  "/admin/extnetworks/{extnet-id}/usage":
    get:
      description: This API returns the number of IPs used and total on given external
        network.
      parameters:
        - description: Ext-Network ID
          in: path
          name: extnet-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.NetIPUsage"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: get IP usage
      tags:
        - Admin/extnet
  /admin/extnetworks/associations:
    get:
      description: >-
        This api lists all associations between projects and external networks.

        It also provides information about which namespaces are associated with each other.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/admin.ExtnetAssoInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: list all Associations
      tags:
        - Admin/extnet
  /admin/flavors:
    get:
      description: Return all flavors with optional filter.
      parameters:
        - description: search by name
          in: query
          name: name
          schema:
            type: string
        - description: search by project_id
          in: query
          name: project_id
          schema:
            type: string
        - description: search by visibility
          in: query
          name: public
          schema:
            type: boolean
        - description: search by global flag
          in: query
          name: global
          schema:
            type: boolean
        - description: search by tag (multiple)
          in: query
          name: tag
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FlavorListOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: List Flavors
      tags:
        - Admin/flavor
    post:
      description: >-
        Create a new flavor with specified parameters.


        Request body parameters:

        - name: Name for this flavor.(required)

        - description: Description of this flavor(optional).

        - public: Whether the flavor is public (available to all projects) or scoped to a set of projects. Default is False.

        - vcpu: The number of virtual CPUs that will be allocated to the server.

        - memory: The amount of RAM, in MiB.

        - disk: The size of the root disk that will be created in GiB.

        - gpu: The info and count of GPUs on each server using this flavor.(optional)

        -- model: The model name of GPU from list gpu models api.(required)

        -- count: The count of GPUs.

        -- is_vgpu: Whether this flavor uses VGPU technology instead of passthoughing physical cards from host machines.

        - project_ids: The IDs of one or more projects who can use this flavor if this flavor is private.(optional)

        - az: Availability zone where servers are located when they're launched based upon this flavor.(optional)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.FlvCreateInput"
        description: body data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FlavorInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Create Flavor
      tags:
        - Admin/flavor
  "/admin/flavors/{flavor-id}":
    delete:
      description: This operation deletes an existing flavor by its unique identifier.
      parameters:
        - description: Flavor ID
          in: path
          name: flavor-id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Delete Flavor
      tags:
        - Admin/flavor
    get:
      description: Return information about an existing flavor identified by its
        unique identifier.
      parameters:
        - description: Flavor ID
          in: path
          name: flavor-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FlavorInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Get Flavor
      tags:
        - Admin/flavor
    put:
      description: >-
        Modify attributes of an existing flavor identified by its unique
        identifier.


        Request body parameters:

        - description: New value for the description attribute.(optional)

        - public: Whether the flavor is public (available to all projects) or scoped to a set of projects.(optional)

        - project_ids: The IDs of one or more projects who can use this flavor if this flavor is private.(optional)
      parameters:
        - description: Flavor ID
          in: path
          name: flavor-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.FlvUpdateInput"
        description: body data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FlavorInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Update Flavor
      tags:
        - Admin/flavor
  /admin/floatingips:
    get:
      description: >-
        List all floating IPs across all projects with admin privileges.
        Supports filtering by various parameters.

        Query parameters:

        - id: Filter by floating IP ID

        - project_id: Filter by project ID

        - name: Filter by floating IP name

        - status: Filter by floating IP status

        - user_id: Filter by user ID

        - namespace: Filter by namespace

        - address: Filter by IP address

        - reserved: Filter by reserved status

        - device_id: Filter by device ID

        - extnet_id: Filter by external network ID

        - state: Filter by state

        - detail: Set to true to get detailed information
      parameters:
        - description: Floating IP ID
          in: query
          name: id
          schema:
            type: string
        - description: Project ID
          in: query
          name: project_id
          schema:
            type: string
        - description: Floating IP name
          in: query
          name: name
          schema:
            type: string
        - description: Floating IP status
          in: query
          name: status
          schema:
            type: string
        - description: User ID
          in: query
          name: user_id
          schema:
            type: string
        - description: Namespace
          in: query
          name: namespace
          schema:
            type: string
        - description: IP address
          in: query
          name: address
          schema:
            type: string
        - description: Reserved status
          in: query
          name: reserved
          schema:
            type: boolean
        - description: Device ID
          in: query
          name: device_id
          schema:
            type: string
        - description: External network ID
          in: query
          name: extnet_id
          schema:
            type: string
        - description: State
          in: query
          name: state
          schema:
            type: string
        - description: Get detailed information
          in: query
          name: detail
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FIPListOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: List Floating IPs (Admin)
      tags:
        - Admin/fip
    post:
      description: >-
        Create a reserved floating IP for a specific project/user/namespace with
        admin privileges.

        This API allows administrators to pre-allocate floating IPs to specific projects and users.

        Optional parameters:

        - address: Specify a specific IP address (must be within the external network's CIDR)

        - extnet_id: Specify which external network to use (defaults to project's default external network)

        The created floating IP will be marked as reserved=true and can be associated with devices later.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/admin.FIPCreateInput"
        description: Floating IP creation parameters
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FloatingIPInfo"
        "400":
          description: Invalid input or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "404":
          description: Project, user, or external network not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "409":
          description: Address already in use or conflicts with device's network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      summary: Create Reserved Floating IP (Admin)
      tags:
        - Admin/fip
  "/admin/floatingips/{fip-id}":
    get:
      description: Get detailed information about a specific floating IP with admin
        privileges.
      parameters:
        - description: Floating IP ID
          in: path
          name: fip-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.FloatingIPInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
