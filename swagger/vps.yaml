  "/project/{project-id}/auto_scale_groups/":
    get:
      description: >-
        List all autoscale groups of a given Project.

        Filter parameter : name, user_id, status , image, flavor, network.

        Parameter 'detail' equals to "True", return more information.


        Request example:

        curl -X 'GET' 'https://localhost:9999/api/v1/project/87659158-4d37-4742-9f83-3e0cd6494b80/auto_scale_groups/?status=ACTIVE&detail=true'
      parameters:
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
        - description: search by name
          in: query
          name: name
          schema:
            type: string
        - description: search by user_id
          in: query
          name: user_id
          schema:
            type: string
        - description: search by status
          in: query
          name: status
          schema:
            type: string
        - description: search by image
          in: query
          name: image_id
          schema:
            type: string
        - description: search by flavor
          in: query
          name: flavor_id
          schema:
            type: string
        - description: search by network
          in: query
          name: network_id
          schema:
            type: string
        - description: get detail infomations
          in: query
          name: detail
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.AsgListOutput"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: List AutoScaleGroup
      tags:
        - User/auto_scale_group
    post:
      description: >-
        Create an autoscale group for the specified parameters and returns its
        details on success.


        Request Body Parameters :

        - name: Name of the autoscale group.(required)

        - description: Description about the autoscale group.(optional)

        - min_size: Minimum number of servers allowed in asg. Default is 1.(optional)

        - max_size: Maximum number of servers allowed in asg.(required).

        - metric: Metric used to trigger scaling action. Must be one of "cpu" or "memory".(required)

        - threshold_up: Percentage above which server instances will scale up when triggered based on selected metrics. Value between 1~99.(required)

        - threshold_down: Percentage below which server instances will scale down when triggered based on selected metrics. Value between 1~99.(required)

        - flavor_id: Flavor UUID to launch upon creation of each member of the autoscaling group.(required)

        - image_id: Image UUID associated with server created within autoscale Group.(required)

        - network_id: Network UUID attached to members of the autoscaling group.(required)

        - sg_ids: Security groups IDs assigned to every instance launched into autoscale group.(array)(required)

        - keypair_id: Keypair ID will be used when launching servers. Requiered if no password provided.

        - password: Password set at time of creating server instance from Autoscale Group. Must be Base64 encoded.(optional)

        - boot_script: Configuration information or scripts to use upon server launch. Must be Base64 encoded.(optional)

        - Admin/volume_type: name of volume type to use for system volume.(optional)
      parameters:
        - description: Project ID
          in: path
          name: project-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user.AsgCreateInput"
        description: body data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pb.AsgInfo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vpserr.ErrResponse"
      security:
        - bearerAuth: []
      summary: Create AutoScaleGroup
      tags:
        - User/auto_scale_group
