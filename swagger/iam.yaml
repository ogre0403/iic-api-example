openapi: 3.0.0
info:
  title: Pegasus IAM RESTful API
  description: Pegasus IAM Restful API ， Response 以 Json 格式呈現，每個 API 需以 Bearer Token 方式認證帳號
  version: v1.9.8
  termsOfService: "http://0.0.0.0:8081"
  contact:
    email: "osci_admin@asus.com"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
servers: 
  - url: https://api.central.iic.nchc.org.tw/iam/api/v1
    description: AI-Cloud
  - url: https://api.central.iic.nchc.org.tw/iam/api/v1/
    description: AI-Trust
  - url: https://api.trusted-cloud.nchc.org.tw/iam/api/v1
    description: 高安控雲
tags:
  - name: "User/Login"
    description: "Login API by User"
  - name: "User/Users"
    description: "User API by User"
  - name: "User/Projects"
    description: "Project API by User"
  - name: "User/Membership"
    description: "Membership API by User"
  - name: "User/Credentials"
    description: "Credential API by User"
  - name: "User/MFA"
    description: "MFA API by User"
  - name: "User/CliSecret"
    description: "CliSecret API by User"
  - name: User/PersonalAccessAPIToken
    description: "Personal Access API Token"
  - name: "User/Permission"
    description: "Permission API by TENANT_ADMIN"
  - name: "User/SAML"
    description: "SAML API by User"  
  - name: "Admin/Login"
    description: "Login API by Admin"
  - name: "Admin/User"
    description: "User API by Admin"
  - name: "Admin/PersonalAccessAPIToken"
    description: "Personal Access API Token"
  - name: "Admin/Action"
    description: "Action API by Admin"
  - name: "Admin/Project"
    description: "Project API by Admin"
  - name: "Admin/Membership"
    description: "Membership API by Admin"
  - name: "Admin/Credential"
    description: "Credential API by Admin"
  - name: "Admin/Frozen"
    description: "Frozen API by Admin"
  - name: "Admin/MFA"
    description: "MFA API by Admin"
  - name: "Admin/CliSecret"
    description: "CliSecret API by Admin"
  - name: "Admin/Permission"
    description: "Permission API by Admin"
  - name: "Admin/SecurityGuard"
    description: "SecurityGuard API by Admin"
  - name: "Admin/UsageTime"
    description: "User and Project Usage Time API by Admin"
  - name: "Admin/System"
    description: "Get system information"
  - name: "Admin/SAML"
    description: "SAML API by Admin"
paths:
  '/version':
    get:
      summary: PegasusIAM版本
      description: 取得系統版本資訊
      tags:
        - User/Login
      responses: 
        '200':
          description: 取得系統版本資訊
          content:
            text/plain:
              example: 1.3.0
  '/scopes':
    get:
      summary: 取得系統的規模
      description: 取得系統的規模
      tags:
        - User/Login
      responses:
        '200':
          description: 取得系統的規模
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScopes'
  '/login':
    post:
      summary: 登入 IAM
      description: 登入 IAM
      requestBody:
        description: |
          登入頁面需輸入登入資訊，成功後會取得 JWT Token 、 user 資訊 與 extra 資訊
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/LoginRequestDefault'
                - $ref: '#/components/schemas/LoginRequestSsoToken'
            examples:
              LoginRequestDefault:
                $ref: '#/components/examples/LoginRequestDefault'
              LoginRequestSsoToken:
                $ref: '#/components/examples/LoginRequestSsoToken'
      tags:
        - User/Login
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/LoginResponseTwccAuth'
                  - $ref: '#/components/schemas/LoginResponseTainanAISSO'
              examples:
                LoginResponse:
                  $ref: '#/components/examples/LoginResponse'
                LoginResponseTwccAuth:
                  $ref: '#/components/examples/LoginResponseTwccAuth'
                LoginResponseTainanAISSO:
                  $ref: '#/components/examples/LoginResponseTainanAISSO'
        '205':
          description: |
            驗證成功，回應轉址的網址並挾帶Token，
            強制MFA模式且未設定MFA時Token為mfaRegisterToken，
            啟用MFA之後Token為mfaToken，
            啟用強制更新密碼時Token為changePasswordToken，
            Token則會以Query Parameter方式帶入
          headers:
            Location:
              schema:
                type: string
              description: 轉址的網址及Token
        '302':
          description: |
            驗證成功，進行轉址並挾帶Token，
            強制MFA模式且未設定MFA時Token為mfaRegisterToken，
            啟用MFA之後Token為mfaToken，
            啟用強制更新密碼時Token為changePasswordToken，
            Token則會以Query Parameter方式帶入
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponseFailed'
                  - $ref: '#/components/schemas/LoginResponseJailer'
              examples:
                LoginResponseFailed:
                  $ref: '#/components/examples/LoginResponseFailed'
                LoginResponseJailer:
                  $ref: '#/components/examples/LoginResponseJailer'
        '500':
          description: Internal Server Error
  '/logout':
    post:
      summary: 登出 IAM
      description: 登出 IAM
      security:
        - bearerAuth: []
      tags:
        - User/Login
      responses:
        '204':
          description: NoContent
  '/verify':
    head:
      summary: 驗證 JWT Token 是否合法
      description: >
        驗證 JWT Token 是否合法
      parameters:
        - in: header
          name: X-Verify-Authorization
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      tags:
        - User/Login
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  '/token/refresh':
    put:
      summary: 更新 IAM token
      description: >
        更新 IAM token
      security:
        - bearerAuth: []
      tags:
        - User/Login
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: BadRequest
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  '/token/admin':
    get:
      summary: 取得 IAM admin token
      description: >
        取得 IAM admin token
      security:
        - bearerAuth: []
      tags:
        - User/Login
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAdminAPITokenResponse'
        '400':
          description: BadRequest
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  '/password':
    post:
      summary: 使用臨時 Token 更新使用者密碼
      description: >
        啟用強制更新密碼時，
        當系統檢查到必須更新密碼的情況會核發臨時權杖 changePasswordToken，
        讓使用者呼叫此 API 更新密碼
      tags:
        - User/Login
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForceChangePasswordRequest'
            examples:
                ForceChangePasswordRequest:
                  $ref: '#/components/examples/ForceChangePasswordRequest'
      responses:
        '204':
          description: No content, password has been changed successfully.
        '400':
          description: BadRequest
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  '/projects':
    get:
      summary: 取得 project
      description: >
        取得 Current User 所擁有的 project 列表
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          required: false
          description: The number of items to skip before starting to collect the result set.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          description: The number of items to return.
        - in: query
          name: order
          schema:
            type: string
          required: false
          description: todo.
      tags:
        - User/Projects
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProjectsResponse'
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
  '/project/{project-id}/':
    get:
      summary: 取得特定 project-id 的 project 資訊
      description: |
        Get a user project by project id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            user project id
      tags:
        - "User/Projects"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProjectResponse'                
        '500':
          description: IAM Server 發生內部錯誤
          
        '400':
          description: user project 不存在
    put:
      summary: 更新 project 資訊
      description: |
        UpdateProject (目前僅能更新ProjectExtra, 僅供 Tenant Owner/Admin 使用)
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
      requestBody:
        description: |
          UpdateProject
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProjectRequest'
      security:
        - bearerAuth: []
      tags:
        - "User/Projects"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProjectResponse'
        '400':
          description: BadRequest
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  '/project/{project-id}/saml':
    post:
      summary: 創建saml by project id
      description: |
        Create a saml by project id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            admin project id
      tags:
        - "User/Projects"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateUserProjectSAMLRequest'
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjectSAMLResponse'
              examples:
                UserProjectSAMLResponse:
                  $ref: '#/components/examples/UserProjectSAMLResponse'
        '500':
          description: IAM Server 發生內部錯誤
          
        '400':
          description: admin project 不存在
  '/project/{project-id}/saml/{saml-id}':
    get:
      summary: 取得 saml by project id and saml-id
      description: |
        Get a saml by project id and saml-id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            admin project id
        - in: path
          name: saml-id
          schema:
            type: string
          required: true
          description: 
            saml id
      tags:
        - "User/Projects"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjectSAMLResponse'
              examples:
                UserProjectSAMLResponse:
                  $ref: '#/components/examples/UserProjectSAMLResponse'              
        '500':
          description: IAM Server 發生內部錯誤
          
        '400':
          description: admin project 不存在
    put:
      summary: 更新 saml by project id and saml-id
      description: |
        Update a saml by project id and saml-id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            admin project id
        - in: path
          name: saml-id
          schema:
            type: string
          required: true
          description: 
            saml id
      tags:
        - "User/Projects"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjectSAMLResponse'
              examples:
                UserProjectSAMLResponse:
                  $ref: '#/components/examples/UserProjectSAMLResponse'            
        '500':
          description: IAM Server 發生內部錯誤
          
        '400':
          description: admin project 不存在
    delete:
      summary: 刪除 saml by project id and saml-id
      description: |
        Delete a saml by project id and saml-id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            admin project id
        - in: path
          name: saml-id
          schema:
            type: string
          required: true
          description: 
            saml id
      tags:
        - "User/Projects"
      responses:
        '204':
              description: No Content     
        '500':
          description: IAM Server 發生內部錯誤
        '400':
          description: admin project 不存在
  '/project/{project-id}/samls':
    get:
      summary: 取得所有的saml by project id
      description: |
        List samls by project id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: 
            admin project id
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          required: false
          description: The number of items to skip before starting to collect the result set.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          required: false
          description: The number of items to return.
      tags:
        - "User/Projects"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUserProjectSAMLResponse'
              examples:
                ListUserProjectSAMLResponse:
                  $ref: '#/components/examples/ListUserProjectSAMLResponse'              
        '500':
          description: IAM Server 發生內部錯誤
          
        '400':
          description: admin project 不存在
  '/user':
    get:
      summary: 取得 user 資訊
      description: >
        取得指定用戶資訊
      security:
        - bearerAuth: []
      tags:
        - User/Users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
    put:
      summary: 更新 user (自身)資訊
      description: |
        UpdateUser (目前僅能更新UserExtra)
      requestBody:
        description: |
          UpdateUser
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      security:
        - bearerAuth: []
      tags:
        - "User/Users"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
  '/user/password':
    put:
      summary: 更換密碼
      description: >
        更換指定用戶的密碼
      security:
        - bearerAuth: []
      requestBody:
        description: 輸入欲更新的密碼，成功回 status 200
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPassword'
      tags:
        - User/Users
      responses:
        '204':
          description: StatusNoContent
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
  '/user/publickey':
    put:
      summary: 更換公開金鑰
      description: >
        更換指定用戶的公開金鑰
      security:
        - bearerAuth: []
      requestBody:
        description: 輸入欲更新的公開金鑰
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPublicKey'
      tags:
        - User/Users
      responses:
        '200':
          description: OK
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
    get:
      summary: 取得公開金鑰
      description: >
        取得指定用戶的公開金鑰
      security:
        - bearerAuth: []
      tags:
        - User/Users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserPublicKey'
        '400':
          description: BadRequest
        '500':
          description: Internal Server Error
  '/membership/project/{project-id}':
    post:
      summary: Create Membership
      description: |
        Create membership by tenant admin/owner
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
      requestBody:
        description: |
          CreateMembership
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateMembershipRequest'
      tags:
        - "User/Membership"
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateMembershipResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
    get:
      summary: List Memberships
      description: |
        List memberships
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          required: false
          description: The number of items to skip before starting to collect the result set.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          description: The number of items to return.
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembershipsByProjectResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  '/membership/project/{project-id}/users':
    get:
      summary: List all users
      description: |
        List All of users, only TENANT_ADMIN or TENANT_OWNER can request
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          required: false
          description: |
            The number of items to skip before starting to collect the result set.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          description: The number of items to return.
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListUsersResponse'
  '/membership/project/{project-id}/batch':
    post:
      summary: Batch Create Memberships
      description: |
        Batch create memberships by tenant admin/owner
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
      requestBody:
        description: |
          CreateMembershipBatch
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateMembershipBatchRequest'
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateMembershipBatchResponse'
  '/membership/project/{project-id}/user/{user-id}':
    put:
      summary: 更新 membership 資訊
      description: |
        UpdateMembership (目前僅能更新MembershipExtra, 僅供 user本人修改 或 Tenant Owner/Admin 使用)
      requestBody:
        description: |
          UpdateMembership
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateMembershipRequest'
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
        - in: path
          name: user-id
          schema:
            type: string
          required: true
          description: User ID
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateMembershipResponse'
        '400':
          description: BadRequest
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
    delete:
      summary: Delete Membership
      description: |
        Delete membership by tenant admin/owner
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
        - in: path
          name: user-id
          schema:
            type: string
          required: true
          description: User ID
      tags:
        - "User/Membership"
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  '/membership/project/{project-id}/user/{user-id}/role':
    put:
      summary: Update Membership Role
      description: |
        Update membership role by tenant admin/owner
      requestBody:
        description: |
          UpdateMembershipRole
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMembershipRoleRequest'
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
        - in: path
          name: user-id
          schema:
            type: string
          required: true
          description: User ID
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateMembershipResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  '/membership/project/{project-id}/user/{user-id}/owner':
    patch:
      summary: 設定專案Owner
      description: |
        設定專案Owner，只有該專案的Owner可以轉換其他人為Owner
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project-id
          schema:
            type: string
          required: true
          description: Project ID
        - in: path
          name: user-id
          schema:
            type: string
          required: true
          description: User ID
      tags:
        - "User/Membership"
      responses:
        '200':
          description: OK
        '400':
