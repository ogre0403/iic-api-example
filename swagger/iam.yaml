                  - $ref: '#/components/schemas/LoginResponseJailer'
              examples:
                LoginResponseFailed:
                  $ref: '#/components/examples/LoginResponseFailed'
                LoginResponseJailer:
                  $ref: '#/components/examples/LoginResponseJailer'
        '500':
