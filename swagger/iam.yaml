      description: >
         generate saml response send to service provider
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: entityID
          schema:
            type: string
          required: true
          description: 用來查找是哪一筆entityID 
        - in: query
          name: SAMLRequest
          schema:
            type: string
          required: true
          description: saml request 是由 service provider 傳送給idp的 xml authn request info. 
        - in: query
          name: RelayState
          schema:
            type: string
          required: true
          description: service provider用來重新導向用戶到原始請求的Context, idp 收到值不做任何處理
