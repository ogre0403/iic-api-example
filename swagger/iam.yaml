          description: |
            驗證成功，回應轉址的網址並挾帶Token，
            強制MFA模式且未設定MFA時Token為mfaRegisterToken，
            啟用MFA之後Token為mfaToken，
            啟用強制更新密碼時Token為changePasswordToken，
            Token則會以Query Parameter方式帶入
