components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DetailVersion:
      type: object
      properties:
        version:
          type: string
          description: PegasusIAM版本
        golangVersion:
          type: string
          description: Golang版本
        modules:
          type: array
          description: 使用到的Pegasus modules
          items: 
            type: string
        eventPublishes:
          type: array
          description: 事件發送的類型與版號
          items: 
            type: string
        authChains:
          type: array
          description: 認證鏈的類型與版號
          items: 
            type: string
      example:
        {
          "version": "1.3.0",
          "golangVersion": "go1.16.8",
          "modules": [
              "pegasus-cloud.com/aes/pegasusiamclient: v1.0.0-20221111-3931127c",
              "pegasus-cloud.com/aes/toolkits: v0.2.0-20221104-9776f128"
          ],
          "eventPublishes": [],
          "authChains": []
        }
    UserScopes:
      type: object
      properties:
        userMFARequired:
          type: boolean
          description: 系統使用者登入時，是否強制驗證MFA
        adminMFARequired:
          type: boolean
          description: 系統管理員登入時，是否強制驗證MFA
        enableStandardRedirectCode:
          type: boolean
          description: 啟用時以302進行轉址，否則回傳205
        enableNamespaced:
          type: boolean
          description: 是否啟用多重命名域
        enablePasswordExpired:
          type: boolean
          description: 是否啟用使用者密碼到期檢查
        enableSecurityGuard:
          type: boolean
          description: 是否啟用登入密碼重試檢查
        permissionValidateMode:
          type: string
          description: 驗證模式是白名單或黑名單
        enablePasswordHistory:
          type: boolean
          description: 是否啟用密碼與過去設定相同的檢查
        enableUserChangeInitialPassword:
          type: boolean
          description: 是否強制使用者更新初始密碼
        enableAdminChangeInitialPassword:
          type: boolean
          description: 是否強制管理員更新初始密碼
