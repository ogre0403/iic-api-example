server {
    listen 80;

    # UI files: index.html, app.js, styles.css
    root /usr/share/nginx/web;
    index index.html;

    # YAML spec files come from the swagger directory
    location ~* \.yaml$ {
        root /usr/share/nginx;
        try_files /swagger$uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
