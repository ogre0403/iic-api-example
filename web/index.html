<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIC API Documentation</title>
  <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements/styles.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="topbar">
    <span class="topbar-title">IIC API Docs</span>
    <!-- Tab buttons are generated at runtime by app.js (from the spec list),
         so adding/removing a swagger/*.yaml never requires editing this file. -->

    <!-- Right-side credential inputs: values are persisted to localStorage and
         automatically injected into Stoplight Try It fields on every render. -->
    <div class="cred-group" id="cred-group">
      <label class="cred-label" for="cred-token">Token</label>
      <input
        class="cred-input"
        id="cred-token"
        type="password"
        placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyLWlkIiwiaWF0IjoxNjAwMDAwMDAwfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        autocomplete="off"
        spellcheck="false"
      />
      <label class="cred-label" for="cred-project-id">Project ID</label>
      <input
        class="cred-input"
        id="cred-project-id"
        type="text"
        placeholder="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </nav>

  <div class="viewer">
    <elements-api
      id="api-viewer"
      router="hash"
      layout="sidebar"
      hideSchemas="true"
      hideExport="true"
    ></elements-api>
  </div>

  <script src="app.js"></script>
</body>
</html>
